<!DOCTYPE html>

<style>

.ni{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.4);font-size:12px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:.1s;position:relative}

.fg{margin-bottom:9px}
.fl{font-size:10.5px;font-weight:600;color:#475569;margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.04em}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Table std */

.mod{background:#fff;border-radius:9px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.2)}

/* Porto section headers */

/* Targa badges */
.tg-m{font-family:monospace;font-weight:700;font-size:11px;background:#fef9c3;color:#713f12;padding:1px 4px;border-radius:2px;display:inline-block}

/* Ord buttons */
.ord-bs{display:flex;flex-direction:column;align-items:center;gap:0}

/* Date nav */
.date-nav{display:flex;align-items:center;gap:6px}

/* Column resize */

<div id="root"></div>
<datalist id="note-sugg">

<script>
'use strict';
// ══════════ CONSTANTS ══════════
const PORTI={LI:'Livorno',SP:'La Spezia',GE:'Genova'};
const PK=['LI','SP','GE'];
const CNT_TYPES=['20 BX','20 HC','20 OT','20 FR','20 RF','40 BX','40 HC','40 OT','40 FR','40 RF','45 HC'];
const ASS_TYPES=['Ferie','Permesso','Malattia','Visita medica','Sospensione'];
const PAT_TYPES=['B','C','CE','C1','C1E','D','DE'];
const GIST_FILE='trasporti_container.json';
const LS_CFG='tc_cfg2', LS_SESS='tc_sess2', LS_DATA='tc_data2';

// ══════════ STATE ══════════
const S={phase:'init',tab:'giornaliero',cfg:null,user:null,data:null,saving:false,date:td(),modal:null,modalData:null,search:{}};

function td(){return new Date().toISOString().split('T')[0];}
function offDate(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}

// ══════════ DEFAULT DATA ══════════
function defData(){return{
  autisti:[],motrici:[],rimorchi:[],
  compagnie:[
    {id:'c1',codice:'MSC',nome:'Mediterranean Shipping Company'},
    {id:'c2',codice:'HL',nome:'Hapag-Lloyd'},
    {id:'c3',codice:'CMA',nome:'CMA CGM'},
    {id:'c4',codice:'ONE',nome:'Ocean Network Express'},
    {id:'c5',codice:'EVG',nome:'Evergreen'},
    {id:'c6',codice:'MAE',nome:'Maersk'},
    {id:'c7',codice:'COS',nome:'COSCO Shipping'},
    {id:'c8',codice:'YML',nome:'Yang Ming'},
    {id:'c9',codice:'PIL',nome:'Pacific International Lines'},
    {id:'c10',codice:'HMM',nome:'Hyundai Merchant Marine'},
    {id:'c11',codice:'ZIM',nome:'ZIM Integrated Shipping'},
  ],
  assenze:[],giornaliero:{},riutilizzi_pending:[],indisponibili:[],
  users:[
    {id:'u1',username:'admin',password:'admin',role:'admin',nome:'Amministratore'},
    {id:'u2',username:'viewer',password:'viewer',role:'reader',nome:'Visualizzatore'},
  ]
};}

// ══════════ HELPERS ══════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fd(d){if(!d)return'—';const[y,m,g]=d.split('-');return`${g}/${m}/${y}`;}
function dTo(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function eb(days){
  if(days===null)return{bg:'#f1f5f9',c:'#94a3b8',t:'—'};
  if(days<0)return{bg:'#fef2f2',c:'#dc2626',t:`Scad.${Math.abs(days)}g`};
  if(days<=30)return{bg:'#fef2f2',c:'#dc2626',t:`${days}gg`};
  if(days<=60)return{bg:'#fffbeb',c:'#d97706',t:`${days}gg`};
  return{bg:'#f0fdf4',c:'#16a34a',t:`${days}gg`};
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function $id(id){return document.getElementById(id);}
function isAss(aid,date,assenze){return(assenze||[]).find(a=>a.autista_id===aid&&a.data_inizio<=date&&a.data_fine>=date);}
function getNomeGiorn(a){
  if(a.soprannome) return '<div class="a-nome">'+esc(a.soprannome)+'</div><div style="font-size:9.5px;color:#94a3b8;margin-top:0px">'+esc(a.cognome)+' '+esc(a.nome)+'</div>';
  return '<div class="a-nome">'+esc(a.cognome)+' '+esc(a.nome)+'</div>';
}
function getMTarga(a){if(!a.motrice_id)return'';const m=(S.data.motrici||[]).find(x=>x.id===a.motrice_id);return m?m.targa:'';}
function getRTarga(a){if(!a.rimorchio_id)return'';const r=(S.data.rimorchi||[]).find(x=>x.id===a.rimorchio_id);return r?r.targa:'';}
function getCC(cid){if(!cid)return'';const c=(S.data.compagnie||[]).find(x=>x.id===cid);return c?c.codice:'';}
function canEdit(tab){
  if(!S.user)return false;
  if(S.user.role==='admin')return true;
  if(S.user.role==='reader')return false;
  return !!(S.user.permissions&&S.user.permissions[tab]);
}
const GIORNI=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
function getDayName(d){return GIORNI[new Date(d+'T12:00:00').getDay()];}
function isWeekend(d){const dw=new Date(d+'T12:00:00').getDay();return dw===0||dw===6;}
function nextWorkingDay(date){
  const d=new Date(date+'T12:00:00');
  do{d.setDate(d.getDate()+1);}while(d.getDay()===0||d.getDay()===6);
  return d.toISOString().split('T')[0];
}
function countAlerts(){
  if(!S.data)return 0;
  const prefs=getScadPrefs();
  const critico=prefs.soglie&&prefs.soglie.critico!=null?prefs.soglie.critico:30;
  const cats=prefs.categorie||{patente:true,visita:true,revisione:true,assicurazione:true,tachigrafo:true};
  let n=0;
  if(cats.patente)(S.data.autisti||[]).filter(a=>a.attivo!==false).forEach(a=>{const x=dTo(a.patente_scad);if(x!==null&&x<=critico)n++;});
  if(cats.visita)(S.data.autisti||[]).filter(a=>a.attivo!==false).forEach(a=>{const x=dTo(a.visita_scad);if(x!==null&&x<=critico)n++;});
  if(cats.revisione){(S.data.motrici||[]).forEach(m=>{const x=dTo(m.rev_scad);if(x!==null&&x<=critico)n++;});(S.data.rimorchi||[]).forEach(r=>{const x=dTo(r.rev_scad);if(x!==null&&x<=critico)n++;});}
  if(cats.assicurazione){(S.data.motrici||[]).forEach(m=>{const x=dTo(m.ass_scad);if(x!==null&&x<=critico)n++;});(S.data.rimorchi||[]).forEach(r=>{const x=dTo(r.ass_scad);if(x!==null&&x<=critico)n++;});}
  if(cats.tachigrafo)(S.data.motrici||[]).forEach(m=>{const x=dTo(m.tach_scad);if(x!==null&&x<=critico)n++;});
  return n;
}

// ══════════ GIST API ══════════
async function gLoad(tok,id){
  const r=await fetch(`https://api.github.com/gists/${id}`,{headers:{Authorization:`token ${tok}`}});
  if(!r.ok)throw new Error(`GitHub ${r.status}`);
  const g=await r.json();const f=g.files[GIST_FILE];
  return f?JSON.parse(f.content):null;
}
async function gSave(tok,id,data){
  const r=await fetch(`https://api.github.com/gists/${id}`,{
    method:'PATCH',headers:{Authorization:`token ${tok}`,'Content-Type':'application/json'},
    body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(data,null,2)}}})
  });
  if(!r.ok)throw new Error(`Save ${r.status}`);
}
async function gCreate(tok){
  const r=await fetch('https://api.github.com/gists',{
    method:'POST',headers:{Authorization:`token ${tok}`,'Content-Type':'application/json'},
    body:JSON.stringify({description:'Trasporti Container',public:false,files:{[GIST_FILE]:{content:JSON.stringify(defData(),null,2)}}})
  });
  if(!r.ok)throw new Error(`Create ${r.status}`);
  return(await r.json()).id;
}

// ══════════ PERSIST ══════════
let saveTimer=null;
function scheduleSave(data){
  if(saveTimer)clearTimeout(saveTimer);
  showSaving(true);
  saveTimer=setTimeout(()=>doSave(data),1000);
}
async function doSave(data){
  try{
    if(S.cfg&&S.cfg.mode==='gist')await gSave(S.cfg.token,S.cfg.gistId,data);
    else localStorage.setItem(LS_DATA,JSON.stringify(data));
  }catch(e){alert('Errore salvataggio: '+e.message);}
  showSaving(false);
}
function showSaving(v){S.saving=v;const el=$id('sv-ind');if(el)el.classList.toggle('hidden',!v);}

function render(){
  // Check if previous year needs archiving (show in Jan/Feb)
  if(S.phase==='app'&&S.data){
    const now=new Date();const month=now.getMonth()+1;const prevYear=String(now.getFullYear()-1);
    if((month===1||month===2)){
      const hasPrevYear=Object.keys(S.data.giornaliero||{}).some(d=>d.startsWith(prevYear));
      const alertKey='tc_arch_alert_'+prevYear;
      if(hasPrevYear&&!localStorage.getItem(alertKey)){
        localStorage.setItem(alertKey,'shown');
        setTimeout(()=>{
          if(confirm('📦 Hai dati del '+prevYear+' non archiviati.\nVuoi aprire la gestione archivi adesso?'))
            showArchiveDialog();
        },1200);
      }
    }
  }
  if(S.phase==='init'){$id('root').innerHTML='<div class="full"><div style="color:rgba(255,255,255,.4);font-size:14px">Caricamento...</div></div>';return;}
  if(S.phase==='setup'){$id('root').innerHTML=renderSetup();return;}
  if(S.phase==='login'){$id('root').innerHTML=renderLogin();return;}
  $id('root').innerHTML=renderApp();
  if(S.modal)renderModal();
}

// ══════════ GIORNALIERO ══════════
function renderGiorn(){
  const isAdmin=canEdit('giornaliero');
  const dayName=getDayName(S.date);
  const weekend=isWeekend(S.date);
  const date=S.date;
  const dd=S.data.giornaliero[date]||{rows:{},porto_overrides:{},order:[]};
  const autisti=(S.data.autisti||[]).filter(a=>a.attivo!==false);
  const prevDate=offDate(date,-1);
  const prevDD=S.data.giornaliero[prevDate]||{rows:{},porto_overrides:{}};
  const isMonday=new Date(date).getDay()===1;
  const enriched=autisti.map(a=>{
    const ass=isAss(a.id,date,S.data.assenze||[]);
    // Porto persistence: today override > last trip porto from yesterday > default porto
    let porto;
    if(dd.porto_overrides[a.id]){
      porto=dd.porto_overrides[a.id];
    }else if(!isMonday){
      const pR=prevDD.rows[a.id];
      const lastPorto=pR?(pR.v2&&pR.v2.porto?pR.v2.porto:pR.v1&&pR.v1.porto?pR.v1.porto:null):null;
      porto=lastPorto||prevDD.porto_overrides[a.id]||a.porto||'LI';
    }else{
      porto=a.porto||'LI';
    }
    const sr=dd.rows[a.id]||{};
    const prevRow=prevDD.rows[a.id];
    const hasPrefill=prevRow&&prevRow.riut==='GD'&&(!sr.v1||(!sr.v1.ie&&!sr.v1.dest&&!sr.v1.comp));
    // Use V2 data for prefill if V2 has a container (V2 riutilizzo)
    const prefSrc=hasPrefill?(prevRow.v2&&prevRow.v2.container?prevRow.v2:prevRow.v1):null;
    // Motrice/rimorchio: use saved, or last used, or archive default
    const defMotrice=sr.motrice!==undefined?sr.motrice:(a.last_motrice||getMTarga(a));
    const defRimorchio=sr.rimorchio!==undefined?sr.rimorchio:(a.last_rimorchio||getRTarga(a));
    // Check indisponibilità
    const motObj=(S.data.motrici||[]).find(m=>m.targa===defMotrice);
    const rimObj=(S.data.rimorchi||[]).find(r=>r.targa===defRimorchio);
    const motIndisp=motObj&&isIndisp('motrice',motObj.id,date);
    const rimIndisp=rimObj&&isIndisp('rimorchio',rimObj.id,date);
    const motIndispTip=motIndisp?getIndispMotivo('motrice',motObj.id,date):'';
    const rimIndispTip=rimIndisp?getIndispMotivo('rimorchio',rimObj.id,date):'';
    const row={
      motrice:defMotrice,rimorchio:defRimorchio,
      riut:sr.riut||'',riut_dest:sr.riut_dest||'',mattino:sr.mattino||false,
      v1:{porto:porto,ora:'',ie:'',container:'',dest:'',note:'',comp:'',lv:false,ritira:'',...(sr.v1||{}),
        ...(hasPrefill?{ie:'E',container:prefSrc&&prefSrc.container||'',comp:prefSrc&&prefSrc.comp||'',dest:prevRow.riut_dest||''}:{})
      },
      v2:{porto:'',ora:'',ie:'',container:'',dest:'',note:'',comp:'',lv:false,ritira:'',...(sr.v2||{})},
    };
    return{...a,ass,porto,row};
  });
  const order=dd.order||[];
  enriched.sort((a,b)=>{
    const ia=order.indexOf(a.id),ib=order.indexOf(b.id);
    if(ia>=0&&ib>=0)return ia-ib;
    if(ia>=0)return -1;if(ib>=0)return 1;
    return(a.cognome+a.nome).localeCompare(b.cognome+b.nome);
  });
  const assenti=[],byPorto={};
  enriched.forEach(a=>{
    if(a.ass){
      const turno=a.ass.turno||'tutto';
      if(turno==='tutto'){assenti.push(a);}
      else{const aa={...a,parziale_turno:turno};if(!byPorto[a.porto])byPorto[a.porto]=[];byPorto[a.porto].push(aa);}
    }else{if(!byPorto[a.porto])byPorto[a.porto]=[];byPorto[a.porto].push(a);}
  });
  const cols=isAdmin?23:22;
  const thH=(lb,cls)=>`<th class="${cls}">${lb}</th>`;
  let html=`
  ${weekend?`<div style="background:${dayName==='Domenica'?'#fef2f2':'#fff7ed'};border-left:4px solid ${dayName==='Domenica'?'#ef4444':'#f97316'};padding:8px 14px;margin-bottom:10px;border-radius:6px;display:flex;align-items:center;gap:10px">
    <span style="font-size:18px">${dayName==='Domenica'?'🔴':'🟡'}</span>
    <span style="font-weight:800;font-size:14px;color:${dayName==='Domenica'?'#dc2626':'#9a3412'};text-transform:uppercase;letter-spacing:.08em">${dayName}</span>
    <span style="color:${dayName==='Domenica'?'#dc2626':'#9a3412'};font-size:12px">— Giorno non lavorativo</span>
  </div>`:''}
  <div class="ph">
    <span class="pt">Giornaliero — <span style="font-size:13px;font-weight:500;color:${weekend?dayName==='Domenica'?'#dc2626':'#f97316':'#64748b'}">${dayName}</span></span>
    <div class="date-nav">
      <button class="btn bg bs" data-act="prevDay" title="Giorno lavorativo precedente">◀</button>
      <input type="date" class="dt-in" value="${date}" onchange="changeDate(this.value)">
      <button class="btn bg bs" data-act="nextDay" title="Giorno lavorativo successivo">▶</button>
      <button class="btn bg bs" data-act="goToday">Oggi</button>
      <button class="btn bp bs" onclick="printGiornaliero()" title="Stampa giornaliero">🖨 Stampa</button>
      <button class="btn bg bs" onclick="resetColWidths()" title="Ripristina larghezze colonne">⟺</button>
    </div>
  </div>
  <div class="giorn-outer"><table class="giorn-table">
    <thead><tr>
      ${isAdmin?`<th class="c-ord"></th>`:''}
      ${thH('#','c-num')}${thH('AUTISTA','c-aut')}${thH('MOTRICE','c-tg')}${thH('Rimorchio','c-tg')}
      ${thH('Porto','c-po')}${thH('ORE','c-ore')}${thH('I/E','c-ie')}${thH('Cntr','c-cnt')}${thH('VIAGGIO','c-vg')}${thH('NOTE','c-nt')}${thH('Carrier','c-cp')}${thH('✓','c-fl')}${thH('RIUT','c-riut')}
      <th class="c-sep"></th>
      ${thH('Porto','c-po')}${thH('ORE','c-ore')}${thH('I/E','c-ie')}${thH('Cntr','c-cnt')}${thH('VIAGGIO','c-vg')}${thH('NOTE','c-nt')}${thH('Carrier','c-cp')}${thH('✓','c-fl')}
    </tr></thead><tbody>`;
  PK.forEach(porto=>{
    const list=byPorto[porto];
    if(!list||!list.length)return;
    html+=`<tr class="porto-hr p-${porto}"><td colspan="${cols}"><div class="porto-lbl">⚓ ${PORTI[porto]} (${porto}) <span class="p-cnt">${list.length}</span></div></td></tr>`;
    list.forEach((a,i)=>{html+=renderGRow(a,i,list.length,isAdmin,date);});
  });


  // Riutilizzi approvati per questa data (senza autista)
  const approvedRiut=(S.data.riutilizzi_pending||[]).filter(r=>r.giornaliero_approved&&r.date===date);
  if(approvedRiut.length){
    const autOpts2=(S.data.autisti||[]).filter(a=>a.attivo!==false)
      .map(a=>'<option value="'+a.id+'">'+esc(a.soprannome||a.cognome+' '+a.nome)+'</option>').join('');
    html+=`<tr class="porto-hr"><td colspan="${cols}" style="padding:0">
      <div class="porto-lbl" style="background:#fff7ed;border-left:3px solid #f97316;color:#9a3412;display:flex;align-items:center;gap:8px">
        🔄 Riutilizzi da abbinare <span class="p-cnt">${approvedRiut.length}</span>
      </div></td></tr>`;
    approvedRiut.forEach(r=>{
      const v1=r.v1||{},v2=r.v2||{};
      html+=`<tr style="background:#fff7ed">
        ${isAdmin?'<td class="c-ord"></td>':''}
        <td class="c-num"></td>
        <td class="c-aut" style="padding:4px 6px" colspan="3">
          <div style="font-size:10px;font-weight:700;color:#9a3412;margin-bottom:4px">
            ${r.riut==='GD'
              ?('📥 '+fd(r.date)+' '+esc(v1.porto||'')+' '+esc(v1.ora||'')+' '+esc(v1.dest||'')+' &nbsp;<span style="color:#f59e0b">→ GD</span>&nbsp; 📤 '+fd(offDate(r.date,1))+' '+esc(v2.porto||'')+' '+esc(v2.ora||'')+' '+esc(v2.dest||''))
              :('📥 '+esc(v1.porto||'')+' '+esc(v1.ora||'')+' '+esc(v1.dest||'')+' &nbsp;↕&nbsp; 📤 '+esc(v2.porto||'')+' '+esc(v2.ora||'')+' '+esc(v2.dest||''))
            }
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <select id="giorn-aut-${r.id}" style="font-size:12px;padding:3px 6px;border:1px solid #fed7aa;border-radius:4px;background:#fff;flex:1">
              <option value="">— Seleziona autista —</option>${autOpts2}
            </select>
            <button class="btn ba bxs" onclick="abbina('${r.id}')">📌 Abbina</button>
            <button class="btn bd bxs" onclick="deleteRiutilizzo('${r.id}')">🗑</button>
          </div>
        </td>
        <td style="font-size:11px;color:#1d4ed8;font-weight:700">I</td>
        <td style="font-size:11px">${esc(v1.ora||'')}</td><td></td>
        <td style="font-size:11px">${esc(v1.container||'')}</td>
        <td style="font-size:11px">${esc(v1.dest||'')}</td>
        <td></td><td style="font-size:11px;font-weight:600">${esc(getCC(v1.comp))}</td>
        <td></td><td></td><td class="c-sep"></td><td></td>
        <td style="font-size:11px">${esc(v2.ora||'')}</td>
        <td style="font-size:11px;color:#c2410c;font-weight:700">E</td>
        <td style="font-size:11px">${esc(v2.container||'')}</td>
        <td style="font-size:11px">${esc(v2.dest||'')}</td>
        <td></td><td style="font-size:11px;font-weight:600">${esc(getCC(v2.comp))}</td>
        <td></td>
      </tr>`;
    });
  }

  if(assenti.length){
    html+=`<tr class="porto-hr p-ASS"><td colspan="${cols}"><div class="porto-lbl">🔴 Non disponibili <span class="p-cnt">${assenti.length}</span></div></td></tr>`;
    assenti.forEach(a=>{
      html+=`<tr class="g-row assente">${isAdmin?'<td class="c-ord"></td>':''}<td class="c-num"></td>
      <td class="c-aut" style="padding:3px 5px"><div class="a-nome">${esc(a.cognome)} ${esc(a.nome)}</div><div class="a-ass">${esc(a.ass.tipo)}</div></td>
      <td colspan="${isAdmin?20:19}" style="color:#94a3b8;font-style:italic;font-size:11px;padding:5px 10px">${esc(a.ass.tipo)}${a.ass.note?' — '+esc(a.ass.note):''} (${fd(a.ass.data_inizio)} → ${fd(a.ass.data_fine)})</td></tr>`;
    });
  }
  if(autisti.length===0){html+=`<tr><td colspan="${cols}" class="empty">Nessun autista in anagrafica. <button class="btn ba bs" data-act="tab" data-tab="autisti" style="margin-left:8px">Aggiungi autisti</button></td></tr>`;}
  html+=`</tbody></table></div>`;
  return html;
}

function renderGRow(a,idx,total,isAdmin,date){
  const r=a.row,v1=r.v1||{},v2=r.v2||{};
  const d=`data-aid="${a.id}" data-dt="${date}"`;
  const cO=(S.data.compagnie||[]).map(c=>`<option value="${c.id}"${v1.comp===c.id?' selected':''}>${esc(c.codice)}</option>`).join('');
  const cO2=(S.data.compagnie||[]).map(c=>`<option value="${c.id}"${v2.comp===c.id?' selected':''}>${esc(c.codice)}</option>`).join('');
  const kO=CNT_TYPES.map(t=>`<option${v1.container===t?' selected':''}>${t}</option>`).join('');
  const kO2=CNT_TYPES.map(t=>`<option${v2.container===t?' selected':''}>${t}</option>`).join('');
  const pO=PK.map(p=>`<option value="${p}"${(v1.porto||a.porto)===p?' selected':''}>${p}</option>`).join('');
  const pO2='<option value=""></option>'+PK.map(p=>`<option value="${p}"${v2.porto===p?' selected':''}>${p}</option>`).join('');
  const pAO=PK.map(p=>`<option value="${p}"${a.porto===p?' selected':''}>${p}</option>`).join('');
  const riut=r.riut||'';
  const parz=a.parziale_turno||'';
  const v1dis=parz==='solo_am';
  const v2dis=parz==='solo_pm';
  const nwd=nextWorkingDay(date);
  const nextAss=isAss(a.id,nwd,S.data.assenze||[]);
  // Revision check
  const mTarga=r.motrice||'';
  const motObj=(S.data.motrici||[]).find(m=>m.targa===mTarga);
  const inRevision=motObj&&motObj.rev_prog_dal&&motObj.rev_prog_al&&date>=motObj.rev_prog_dal&&date<=motObj.rev_prog_al;
  const v1bg=v1.lv?'background:#fde047;':v1dis?'background:#fff7ed;':'';
  const v2bg=v2.lv?'background:#fde047;':v2dis?'background:#fff7ed;':'';
  // V2 section
  let v2Html='';
  if(riut==='GD'){
    const nxtDate=offDate(date,1);const nxtDD=(S.data.giornaliero[nxtDate]||{rows:{}});const nxtRow=nxtDD.rows[a.id];const nxtDest=nxtRow&&nxtRow.v1&&nxtRow.v1.dest?nxtRow.v1.dest:'';
    const gdDisplayVal=nxtDest||r.riut_dest||'';
    const gdConfirmed=!!nxtDest;
    const v2HasData=!!(v2.container||v2.dest||v2.ora);
    if(v2HasData){
      // V2 has actual data (afternoon trip): show it + riut_dest below
      // Use string concatenation to avoid 3-level template literal nesting
      const gdDestRow='<div style="color:#9a3412;font-size:9.5px;margin-top:1px">⟶ domani: '
        +(isAdmin?'<input class="ci" value="'+esc(gdDisplayVal)+'" data-fld="riut_dest" '+d+' placeholder="dest. domani" style="max-width:100px;font-weight:700;color:'+(gdConfirmed?'#16a34a':'#9a3412')+'">':'<strong>'+esc(gdDisplayVal||'—')+'</strong>')
        +'</div>';
      const v2DestCell=isAdmin
        ?('<div><div style="display:flex;gap:2px;align-items:center"><input class="ci" value="'+esc(v2.dest||'')+'" data-fld="v2.dest" '+d+' placeholder="destinazione"><button class="ritira-btn'+(v2.ritira?' on':'')+'" data-ev="ritira" data-vg="v2" data-date="'+date+'" data-aid="'+a.id+'">👤</button></div>'+gdDestRow+'</div>')
        :('<div><span>'+esc(v2.dest||'')+'</span>'+(v2.ritira?'<div class="ritira-txt">'+esc(v2.ritira)+'</div>':'')+'<div style="color:#9a3412;font-size:9.5px">⟶ '+esc(gdDisplayVal||'—')+'</div></div>');
      v2Html='<td class="c-sep"></td>'
        +'<td class="c-po v2c" style="'+v2bg+'">'+(isAdmin?'<select class="cs" data-fld="v2.porto" '+d+'><option value=""></option>'+PK.map(p=>'<option value="'+p+'"'+(v2.porto===p?' selected':'')+'>'+p+'</option>').join('')+'</select>':'<span>'+(v2.porto||'')+'</span>')+'</td>'
        +'<td class="c-ore v2c" style="'+v2bg+'">'+(isAdmin?'<input class="ci" type="time" value="'+esc(v2.ora||'')+'" data-fld="v2.ora" '+d+'>':'<span>'+(v2.ora||'')+'</span>')+'</td>'
        +'<td class="c-ie v2c" style="'+v2bg+'">'+(isAdmin?'<select class="cs" data-fld="v2.ie" '+d+'><option value=""></option><option value="I"'+(v2.ie==='I'?' selected':'')+'>I</option><option value="E"'+(v2.ie==='E'?' selected':'')+'>E</option></select>':'<span class="'+(v2.ie?'ie-'+v2.ie:'')+'">'+esc(v2.ie||'')+'</span>')+'</td>'
        +'<td class="c-cnt v2c" style="'+v2bg+'">'+(isAdmin?'<select class="cs" data-fld="v2.container" '+d+'><option value=""></option>'+CNT_TYPES.map(t=>'<option'+(v2.container===t?' selected':'')+'>'+t+'</option>').join('')+'</select>':'<span>'+esc(v2.container||'')+'</span>')+'</td>'
        +'<td class="c-vg v2c" style="'+v2bg+'" colspan="2">'+v2DestCell+'</td>'
        +'<td class="c-cp v2c" style="'+v2bg+'">'+(isAdmin?'<select class="cs" data-fld="v2.comp" '+d+'><option value=""></option>'+(S.data.compagnie||[]).map(co=>'<option value="'+co.id+'"'+(v2.comp===co.id?' selected':'')+'>'+esc(co.codice)+'</option>').join('')+'</select>':'<span style="font-size:11px;font-weight:600">'+esc(getCC(v2.comp))+'</span>')+'</td>'

          <span style="font-size:15px;font-weight:700">⟶</span>

          ${gdConfirmed?`<span style="color:#16a34a;font-size:10px">✓ confermato</span>`:''}

  }else{
    v2Html=`<td class="c-sep"></td>
    <td class="c-po v2c" style="${v2bg}">${isAdmin?`<select class="cs" data-fld="v2.porto" ${d}>${pO2}</select>`:`<span>${v2.porto||''}</span>`}</td>
    <td class="c-ore v2c" style="${v2bg}">${isAdmin?`<input class="ci" type="time" value="${esc(v2.ora||'')}" data-fld="v2.ora" ${d}>`:`<span>${v2.ora||''}</span>`}</td>
    <td class="c-ie v2c" style="${v2bg}">${isAdmin?`<select class="cs" data-fld="v2.ie" ${d}><option value=""></option><option value="I"${v2.ie==='I'?' selected':''}>I</option><option value="E"${v2.ie==='E'?' selected':''}>E</option></select>`:`<span class="${v2.ie?'ie-'+v2.ie:''}">${v2.ie||''}</span>`}</td>
    <td class="c-cnt v2c" style="${v2bg}">${isAdmin?`<select class="cs" data-fld="v2.container" ${d}><option value=""></option>${kO2}</select>`:`<span>${esc(v2.container||'')}</span>`}</td>
    <td class="c-vg v2c" style="${v2bg}">${isAdmin?`<div><div style="display:flex;gap:2px;align-items:center"><input class="ci" value="${esc(v2.dest||'')}" data-fld="v2.dest" ${d} placeholder="destinazione"><button class="ritira-btn${v2.ritira?' on':''}" onclick="showRitiraPopup(event,'${date}','${a.id}','v2')" title="${esc(v2.ritira||'Chi ritira?')}">👤</button></div>${v2.ritira?`<div class="ritira-txt">${esc(v2.ritira)}</div>`:''}</div>`:`<div><span>${esc(v2.dest||'')}</span>${v2.ritira?`<div class="ritira-txt">${esc(v2.ritira)}</div>`:''}</div>`}</td>
    <td class="c-nt v2c" style="${v2bg}">${isAdmin?`<input class="ci" value="${esc(v2.note||'')}" data-fld="v2.note" ${d} placeholder="note">`:`<span style="font-size:11px;color:#64748b">${esc(v2.note||'')}</span>`}</td>
    <td class="c-cp v2c" style="${v2bg}">${isAdmin?`<select class="cs" data-fld="v2.comp" ${d}><option value=""></option>${cO2}</select>`:`<span style="font-size:11px;font-weight:600">${esc(getCC(v2.comp))}</span>`}</td>
    <td class="c-fl v2c" style="text-align:center;${v2bg}"><input type="checkbox" class="ck" ${v2.lv?'checked':''} data-fld="v2.lv" ${d} ${isAdmin?'':'disabled'}></td>`;
  }
  return `<tr class="g-row${v1.lv?' v1lv':''}${v2.lv?' v2lv':''}" data-aid="${a.id}">
    ${isAdmin?`<td class="c-ord v1c" style="${v1bg}"><div class="ord-bs">
      <button class="matt-btn${r.mattino?' on':''}" data-act="mattino" ${d} title="Ritiro mattina stessa">＋</button>
      ${idx>0?`<button class="ord-b" data-act="up" ${d}>▲</button>`:''}
      ${idx<total-1?`<button class="ord-b" data-act="dn" ${d}>▼</button>`:''}
    </div></td>`:''}
    <td class="c-num v1c" style="text-align:center;${v1bg}">${r.mattino?`<span class="matt-lbl">＋</span>`:''}${idx+1}</td>
    <td class="c-aut v1c" style="padding:2px 4px;${v1bg}">
      ${getNomeGiorn(a)}
      ${isAdmin?`<select class="cs" data-fld="porto_override" ${d} onchange="updateGiornCell('${date}','${a.id}','porto_override',this.value)" style="font-size:10px;color:#94a3b8;margin-top:1px">${pAO}</select>`:`<div class="a-sub">${a.porto}</div>`}

      ${inRevision?`<span style="display:inline-block;background:#fef3c7;color:#92400e;font-size:9.5px;font-weight:700;padding:1px 4px;border-radius:3px;margin-top:1px">🔧 motrice in revisione</span>`:''}
    </td>
    <td class="c-tg v1c" style="${v1bg}">${isAdmin?`<input class="ci" value="${esc(r.motrice||'')}" data-fld="motrice" ${d} placeholder="targa" style="font-family:monospace;font-weight:700;background:#fef9c3;color:#713f12;text-transform:uppercase">`:`<span class="tg-m">${esc(r.motrice||'—')}</span>`}${(()=>{const _m=(S.data.motrici||[]).find(m=>m.targa===r.motrice);return _m&&isIndisp('motrice',_m.id,date)?`<span title="${getIndispMotivo('motrice',_m.id,date)}" style="color:#dc2626;font-size:10px;cursor:help">🔴</span>`:'';})()}</td>

function updateGiornCell(date,aid,fld,val){
  const data=S.data;
  if(!data.giornaliero)data.giornaliero={};
  if(!data.giornaliero[date])data.giornaliero[date]={rows:{},porto_overrides:{},order:[]};
  const dd=data.giornaliero[date];
  const autista=(data.autisti||[]).find(a=>a.id===aid);
  if(!autista)return;
  if(!dd.rows[aid]){
    const prevDate=offDate(date,-1);
    const prevDD=data.giornaliero[prevDate]||{rows:{}};
    const prevRow=prevDD.rows[aid];
    const gdPrefill=prevRow&&prevRow.riut==='GD';
    const pSrc=gdPrefill?(prevRow.v2&&prevRow.v2.container?prevRow.v2:prevRow.v1):null;
    const isMonday=new Date(date).getDay()===1;
    const prevPorto=!isMonday&&(data.giornaliero[prevDate]||{porto_overrides:{}}).porto_overrides&&(data.giornaliero[prevDate]||{porto_overrides:{}}).porto_overrides[aid];
    dd.rows[aid]={
      motrice:autista.last_motrice||getMTarga(autista),
      rimorchio:autista.last_rimorchio||getRTarga(autista),
      riut:'',riut_dest:'',mattino:false,
      v1:{porto:prevPorto||autista.porto||'LI',ora:'',
        ie:gdPrefill?'E':'',
        container:gdPrefill&&pSrc?pSrc.container:'',
        dest:gdPrefill?prevRow.riut_dest||'':'',
        note:'',comp:gdPrefill&&prevRow.v1?prevRow.v1.comp:'',
        lv:false,ritira:''},
      v2:{porto:'',ora:'',ie:'',container:'',dest:'',note:'',comp:'',lv:false,ritira:''}
    };
  }
  const row=dd.rows[aid];
  if(fld==='porto_override'){
    dd.porto_overrides[aid]=val;
    S.data=data;
    refreshGiorn();
    scheduleSave(data);return;
  }
  if(fld==='riut'){
    row.riut=val;
    if(val==='SD'){
      row.v2.ie='E';row.v2.container=row.v1.container||'';
      row.v2.comp=row.v1.comp||'';row.v2.porto=row.v1.porto||autista.porto||'LI';
      // DO NOT auto-set lv — user controls yellow manually
    }else{
      row.v1.lv=false;
      // Clear V2 auto-filled fields when SD removed
      row.v2={porto:'',ora:'',ie:'',container:'',dest:'',note:'',comp:'',lv:false,ritira:''};
    }
    S.data=data;
    refreshGiorn();
    scheduleSave(data);return;
  }
  if(fld==='riut_dest'){
    row.riut_dest=val;
    // Sync to next day v1.dest
    const nxtD=offDate(date,1);
    if(!data.giornaliero[nxtD])data.giornaliero[nxtD]={rows:{},porto_overrides:{},order:[]};
    const nddR=data.giornaliero[nxtD];
    if(!nddR.rows[aid])nddR.rows[aid]={motrice:autista.last_motrice||getMTarga(autista),rimorchio:autista.last_rimorchio||getRTarga(autista),riut:'',riut_dest:'',mattino:false,v1:{porto:autista.porto||'LI',ora:'',ie:'',container:'',dest:val,note:'',comp:'',lv:false,ritira:''},v2:{porto:'',ora:'',ie:'',container:'',dest:'',note:'',comp:'',lv:false,ritira:''}};
    else nddR.rows[aid].v1={...(nddR.rows[aid].v1||{}),dest:val};
  }
  else if(fld==='mattino'){
    row.mattino=val;
    S.data=data;
    refreshGiorn();
    scheduleSave(data);return;
  }
  else if(fld==='motrice'){
    row.motrice=val.toUpperCase();
    // Propagate to autista archive for future days
    const aut=data.autisti.find(x=>x.id===aid);
    if(aut)aut.last_motrice=val.toUpperCase();
  }
  else if(fld==='rimorchio'){
    row.rimorchio=val.toUpperCase();
    const aut=data.autisti.find(x=>x.id===aid);
    if(aut)aut.last_rimorchio=val.toUpperCase();
  }
  else if(fld.startsWith('v1.')){
    const k=fld.slice(3);
    if(k==='lv'){
      row.v1.lv=val;
      // Update row class directly
      const tr=document.querySelector(`tr[data-aid="${aid}"]`);
      if(tr)tr.classList.toggle('v1lv',val);
    }else{
      row.v1[k]=val;
      if(row.riut==='SD'){
        if(k==='container'){row.v2.container=val;}
        if(k==='comp'){row.v2.comp=val;}
        if(k==='porto'){row.v2.porto=val;}
      }
      if(k==='dest'){
        const pD2=offDate(date,-1);const pDD2=data.giornaliero[pD2]||{rows:{}};
        const pR2=pDD2.rows[aid];if(pR2&&pR2.riut==='GD')pR2.riut_dest=val;
      }
    }
  }
  else if(fld.startsWith('v2.')){
    const k=fld.slice(3);
    if(k==='lv'){
      row.v2.lv=val;
      const tr=document.querySelector(`tr[data-aid="${aid}"]`);
      if(tr)tr.classList.toggle('v2lv',val);
    }else row.v2[k]=val;
  }
  S.data=data;scheduleSave(data);
}

function moveAutista(date,aid,dir){
  const data=S.data;
  if(!data.giornaliero)data.giornaliero={};
  if(!data.giornaliero[date])data.giornaliero[date]={rows:{},porto_overrides:{},order:[]};
  const dd=data.giornaliero[date];
  const autisti=(data.autisti||[]).filter(a=>a.attivo!==false);
  const savedOrder=dd.order||[];
  const enriched=autisti.map(a=>({...a,ass:isAss(a.id,date,data.assenze||[]),porto:dd.porto_overrides[a.id]||a.porto||'LI'})).filter(a=>!a.ass);
  enriched.sort((a,b)=>{const ia=savedOrder.indexOf(a.id),ib=savedOrder.indexOf(b.id);if(ia>=0&&ib>=0)return ia-ib;if(ia>=0)return -1;if(ib>=0)return 1;return(a.cognome+a.nome).localeCompare(b.cognome+b.nome);});
  const autista=enriched.find(a=>a.id===aid);if(!autista)return;
  const grp=enriched.filter(a=>a.porto===autista.porto);
  const pos=grp.findIndex(a=>a.id===aid);
  if(dir===-1&&pos===0)return;if(dir===1&&pos===grp.length-1)return;
  const swapId=grp[pos+dir].id;
  const newOrder=enriched.map(a=>a.id);
  const pA=newOrder.indexOf(aid),pB=newOrder.indexOf(swapId);
  [newOrder[pA],newOrder[pB]]=[newOrder[pB],newOrder[pA]];
  dd.order=newOrder;S.data=data;
  refreshGiorn();
  scheduleSave(data);
}

function showRitiraPopup(e,date,aid,v){
  e.stopPropagation();
  const existing=document.getElementById('ritira-pop');
  if(existing){existing.remove();return;}
  const dd=(S.data.giornaliero[date]||{rows:{}}).rows[aid]||{};
  const currentVal=(dd[v]&&dd[v].ritira)||'';
  const pop=document.createElement('div');
  pop.id='ritira-pop';
  const rect=e.target.getBoundingClientRect();
  pop.style.top=(rect.bottom+5)+'px';
  pop.style.left=Math.max(8,Math.min(rect.left,window.innerWidth-240))+'px';
  pop.innerHTML=`<div style="font-size:11px;font-weight:700;color:#475569;margin-bottom:7px">👤 Chi ritira? (${v==='v1'?'1° viaggio':'2° viaggio'})</div>
    <input id="ritira-inp" value="${currentVal.replace(/"/g,'&quot;')}" placeholder="es. ritira Pino, GW000DA" style="width:100%;font-size:12.5px;padding:5px 7px;border:1px solid #e2e8f0;border-radius:5px;outline:none;margin-bottom:8px">
    <div style="display:flex;justify-content:flex-end;gap:6px">
      <button onclick="document.getElementById('ritira-pop').remove()" style="padding:4px 10px;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;background:#fff;font-size:12px">✕</button>
      <button onclick="saveRitira('${date}','${aid}','${v}')" style="padding:4px 10px;background:#f59e0b;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px">✓ OK</button>
    </div>`;
  document.body.appendChild(pop);
  const inp=document.getElementById('ritira-inp');
  inp.focus();inp.select();
  inp.onkeydown=ev=>{if(ev.key==='Enter')saveRitira(date,aid,v);if(ev.key==='Escape')pop.remove();};
  setTimeout(()=>document.addEventListener('click',function cp(ev){if(!pop.contains(ev.target)){pop.remove();document.removeEventListener('click',cp);}},),100);
}
function saveRitira(date,aid,v){
  const val=(document.getElementById('ritira-inp')||{}).value||'';
  updateGiornCell(date,aid,v+'.ritira',val);
  const pop=document.getElementById('ritira-pop');if(pop)pop.remove();
  refreshGiorn();
}

      <div><label class="fl">🔴 Critico (gg)</label><input id="sp-critico" type="number" value="${s.critico}" min="1" max="365" style="padding:5px 8px;font-size:12.5px"></div>
      <div><label class="fl">🟡 Attenzione (gg)</label><input id="sp-attenzione" type="number" value="${s.attenzione}" min="1" max="365" style="padding:5px 8px;font-size:12.5px"></div>

      <div><label class="fl">📧 Destinatario email</label><input id="sp-email" type="email" value="${esc(prefs.email_dest||'')}" placeholder="nome@esempio.it" style="padding:5px 8px;font-size:12.5px"></div>
    </div>
  </div>

  <!-- Contatori -->
  <div class="stat-grid" style="margin-bottom:12px">
    <div class="sc" style="border-left:3px solid #dc2626"><div class="sc-l">Scaduti</div><div class="sc-v" style="color:${scad>0?'#dc2626':'#0c1c2e'}">${scad}</div></div>
    <div class="sc" style="border-left:3px solid #ef4444"><div class="sc-l">Critici (≤${s.critico}gg)</div><div class="sc-v" style="color:${crit>0?'#dc2626':'#0c1c2e'}">${crit}</div></div>

      const bg=it.days<0?'#fef2f2':it.days<=s.critico?'#fef2f2':it.days<=s.attenzione?'#fffbeb':'#eff6ff';

async function migratePasswordsToHash(){
  if(!confirm('Converte tutte le password in hash SHA-256.\nLe password funzioneranno esattamente come prima.\n\nProcedere?'))return;
  const data=S.data;
  let count=0;
  for(const u of data.users||[]){
    if(!/^[0-9a-f]{64}$/.test(u.password)){
      u.password=sha256(u.password);
      count++;
    }
  }
  S.data=data;scheduleSave(data);
  alert('Migrazione completata: '+count+' password convertite in hash.');
  const m=document.querySelector('.main');if(m)m.innerHTML=renderImpost();
}

      ✓ Inizia
    </button>

function setupMode(m){S._setupMode=m;$id('root').innerHTML=renderSetup();}

async function doSetup(){
  const mode=S._setupMode||'gist';
  const btn=$id('setup-btn');
  const errEl=$id('setup-err');
  btn.textContent='⏳ Connessione...';btn.disabled=true;errEl.style.display='none';
  try{
    if(mode==='gist'){
      const tok=($id('s-token').value||'').trim();
      if(!tok)throw new Error('Inserisci il token GitHub');
      let gid=($id('s-gistid').value||'').trim();
      if(!gid)gid=await gCreate(tok);
      const data=await gLoad(tok,gid)||defData();
      const cfg={mode:'gist',token:tok,gistId:gid};
      localStorage.setItem(LS_CFG,JSON.stringify(cfg));
      S.cfg=cfg;S.data=data;S.phase='login';render();
    }else{
      const cfg={mode:'local'};
      let data=defData();
      try{const saved=localStorage.getItem(LS_DATA);if(saved)data=JSON.parse(saved);}catch{}
      localStorage.setItem(LS_CFG,JSON.stringify(cfg));
      S.cfg=cfg;S.data=data;S.phase='login';render();
    }
  }catch(e){errEl.textContent=e.message;errEl.style.display='block';btn.textContent='✓ Inizia';btn.disabled=false;}
}

async function doLogin(){
  const u=($id('l-user').value||'').trim();
  const p=($id('l-pass').value||'').trim();
  const users=S.data&&S.data.users||[{id:'u1',username:'admin',password:'admin',role:'admin',nome:'Amministratore'}];
  const found=users.find(x=>x.username===u);
  if(!found||!checkPassword(p,found.password)){const e=$id('login-err');e.textContent='Username o password errati';e.style.display='block';return;}
  localStorage.setItem(LS_SESS,JSON.stringify(found));
  S.user=found;S.phase='app';if(S.cfg&&S.cfg.mode==='gist')startSync();render();
}

function doModalSave(){
  const t=S.modal,d=S.modalData||{};
  if(t==='autista')saveAutista(d.id);
  else if(t==='assenza')saveAssenza(d.id);
  else if(t==='motrice')saveMotrice(d.id);
  else if(t==='rimorchio')saveRimorchio(d.id);
  else if(t==='compagnia')saveCompagnia(d.id);
  else if(t==='user')saveUser(d.id);
  else if(t==='user-pwd')saveOwnPassword();
  else if(t==='excel-export')doModalSave_excel();
  else if(t==='archive-year')doArchiveYear();
}

async function saveUser(existingId){
  const nome=g('f-nome').trim(),username=g('f-username').trim(),password=g('f-password').trim();
  if(!nome||!username||!password){alert('Tutti i campi sono obbligatori');return;}
  const role=g('f-role')||'reader';
  let permissions={};
  if(role==='utente'){permissions={giornaliero:!!($id('p-giorn')||{}).checked,autisti:!!($id('p-autisti')||{}).checked,assenze:!!($id('p-assenze')||{}).checked,motrici:!!($id('p-motrici')||{}).checked,rimorchi:!!($id('p-rimorchi')||{}).checked,compagnie:!!($id('p-compagnie')||{}).checked,riutilizzi:!!($id('p-riutilizzi')||{}).checked,storico:!!($id('p-storico')||{}).checked};}
  const item={id:existingId||uid(),nome,username,password,role,permissions};
  const data=S.data;
  if(existingId)data.users=data.users.map(x=>x.id===existingId?item:x);
  else data.users=[...(data.users||[]),item];
  // Update session if editing self
  if(existingId===S.user.id){S.user=item;localStorage.setItem(LS_SESS,JSON.stringify(item));}
  S.data=data;closeModal();scheduleSave(data);
  const m=document.querySelector('.main');if(m)m.innerHTML=renderImpost();
}

async function saveOwnPassword(){
  const oldPwd=($id('f-pwd-old')||{}).value||'';
  const newPwd=($id('f-pwd-new')||{}).value||'';
  const newPwd2=($id('f-pwd-new2')||{}).value||'';
  if(!oldPwd||!newPwd||!newPwd2){alert('Compila tutti i campi');return;}
  if(newPwd!==newPwd2){alert('Le nuove password non coincidono');return;}
  if(newPwd.length<4){alert('La nuova password deve avere almeno 4 caratteri');return;}
  const data=S.data;
  const me=(data.users||[]).find(u=>u.id===S.user.userId);
  if(!me){alert('Utente non trovato.');return;}
  const oldOk=checkPassword(oldPwd,me.password);
  if(!oldOk){alert('Password attuale non corretta');return;}
  const hashed=sha256(newPwd);
  data.users=data.users.map(u=>u.id===S.user.userId?{...u,password:hashed}:u);
  S.data=data;closeModal();scheduleSave(data);
  alert('Password cambiata con successo!');
}

// ══════════ SCADENZE PREFS ══════════
const SCAD_CATS = [
  {id:'patente',    label:'Patente',               icon:'📋'},
  {id:'visita',     label:'Visita medica',          icon:'🏥'},
  {id:'revisione',  label:'Revisioni (mezzi)',       icon:'🔧'},
  {id:'assicurazione',label:'Assicurazioni (mezzi)', icon:'📄'},
  {id:'tachigrafo', label:'Tachigrafo',              icon:'⏱'},
];
const LS_SCAD_PREFS = 'tc_scad_';
function getScadPrefs(){
  try{
    const raw = localStorage.getItem(LS_SCAD_PREFS+(S.user&&S.user.id||''));
    if(raw) return JSON.parse(raw);
  }catch{}
  return {
    categorie:{patente:true,visita:true,revisione:true,assicurazione:true,tachigrafo:true},
    soglie:{avviso:90,attenzione:60,critico:30},
    email_dest:''
  };
}
function saveScadPrefs(prefs){
  localStorage.setItem(LS_SCAD_PREFS+(S.user&&S.user.id||''), JSON.stringify(prefs));
}
function applyScadPrefs(){
  const prefs = getScadPrefs();
  const cats = prefs.categorie||{};
  const s = prefs.soglie||{avviso:90,attenzione:60,critico:30};
  prefs.categorie = {
    patente:    ($id('sp-patente')||{}).checked??cats.patente,
    visita:     ($id('sp-visita')||{}).checked??cats.visita,
    revisione:  ($id('sp-revisione')||{}).checked??cats.revisione,
    assicurazione:($id('sp-assicurazione')||{}).checked??cats.assicurazione,
    tachigrafo: ($id('sp-tachigrafo')||{}).checked??cats.tachigrafo,
  };
  prefs.soglie = {
    avviso:    parseInt(($id('sp-avviso')||{}).value)||90,
    attenzione:parseInt(($id('sp-attenzione')||{}).value)||60,
    critico:   parseInt(($id('sp-critico')||{}).value)||30,
  };
  prefs.email_dest = ($id('sp-email')||{}).value||'';
  saveScadPrefs(prefs);
  const m=document.querySelector('.main');if(m)m.innerHTML=renderScadenze();
}
function copyScadEmail(){
  const prefs=getScadPrefs();
  const items=buildScadItems(prefs);
  if(!items.length){alert('Nessuna scadenza da segnalare.');return;}
  let body='RIEPILOGO SCADENZE - '+fd(td())+'\n\n';
  items.forEach(it=>{const stato=it.days<0?'SCADUTA':it.days<=(prefs.soglie.critico||30)?'CRITICA':it.days<=(prefs.soglie.attenzione||60)?'ATTENZIONE':'AVVISO';body+=`[${stato}] ${it.tipo} — ${it.nome} — Scadenza: ${fd(it.scad)} (${it.days<0?'scad. '+Math.abs(it.days)+'gg fa':it.days+'gg'})\n`;});
  navigator.clipboard.writeText(body).then(()=>alert('Testo copiato! Incollalo nella tua email.')).catch(()=>{const t=document.createElement('textarea');t.value=body;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();alert('Testo copiato! Incollalo nella tua email.');});
}
function sendScadEmail(){
  applyScadPrefs();
  const prefs=getScadPrefs();
  const items=buildScadItems(prefs);
  if(!items.length){alert('Nessuna scadenza da segnalare con i filtri impostati.');return;}
  let body='RIEPILOGO SCADENZE - '+fd(td())+'\n\n';
  items.forEach(it=>{
    const stato=it.days<0?'SCADUTA':it.days<=prefs.soglie.critico?'CRITICA':it.days<=prefs.soglie.attenzione?'ATTENZIONE':'AVVISO';
    body+=`[${stato}] ${it.tipo} — ${it.nome} — Scadenza: ${fd(it.scad)} (${it.days<0?'scad. '+Math.abs(it.days)+'gg fa':it.days+'gg'} )\n`;
  });
  const dest=prefs.email_dest||'';
  const subj=encodeURIComponent('Scadenze Flotta — '+fd(td()));
  const bodyEnc=encodeURIComponent(body);
  window.location.href=`mailto:${dest}?subject=${subj}&body=${bodyEnc}`;
}
function buildScadItems(prefs){
  const cats=prefs.categorie||{patente:true,visita:true,revisione:true,assicurazione:true,tachigrafo:true};
  const soglia=prefs.soglie||{avviso:90};
  const items=[];
  if(cats.patente)(S.data.autisti||[]).filter(a=>a.attivo!==false).forEach(a=>{
    const d=dTo(a.patente_scad);if(d!==null&&d<=soglia.avviso)items.push({tipo:'Patente',nome:`${a.cognome} ${a.nome}`,scad:a.patente_scad,days:d,cat:'autista'});
  });
  if(cats.visita)(S.data.autisti||[]).filter(a=>a.attivo!==false).forEach(a=>{
    const d=dTo(a.visita_scad);if(d!==null&&d<=soglia.avviso)items.push({tipo:'Visita medica',nome:`${a.cognome} ${a.nome}`,scad:a.visita_scad,days:d,cat:'autista'});
  });
  if(cats.revisione){
    (S.data.motrici||[]).forEach(m=>{const d=dTo(m.rev_scad);if(d!==null&&d<=soglia.avviso)items.push({tipo:'Revisione',nome:m.targa+' '+(m.marca||''),scad:m.rev_scad,days:d,cat:'motrice'});});
    (S.data.rimorchi||[]).forEach(r=>{const d=dTo(r.rev_scad);if(d!==null&&d<=soglia.avviso)items.push({tipo:'Revisione',nome:r.targa,scad:r.rev_scad,days:d,cat:'rimorchio'});});
  }
  if(cats.assicurazione){
    (S.data.motrici||[]).forEach(m=>{const d=dTo(m.ass_scad);if(d!==null&&d<=soglia.avviso)items.push({tipo:'Assicurazione',nome:m.targa+' '+(m.marca||''),scad:m.ass_scad,days:d,cat:'motrice'});});
    (S.data.rimorchi||[]).forEach(r=>{const d=dTo(r.ass_scad);if(d!==null&&d<=soglia.avviso)items.push({tipo:'Assicurazione',nome:r.targa,scad:r.ass_scad,days:d,cat:'rimorchio'});});
  }
  if(cats.tachigrafo)(S.data.motrici||[]).forEach(m=>{
    const d=dTo(m.tach_scad);if(d!==null&&d<=soglia.avviso)items.push({tipo:'Tachigrafo',nome:m.targa+' '+(m.marca||''),scad:m.tach_scad,days:d,cat:'motrice'});
  });
  items.sort((a,b)=>a.days-b.days);
  return items;
}

async function listGistArchives(){
  if(!S.cfg||S.cfg.mode!=='gist')return[];
  try{
    const r=await fetch(`https://api.github.com/gists/${S.cfg.gistId}`,{
      headers:{Authorization:`token ${S.cfg.token}`}
    });
    if(!r.ok)return[];
    const g=await r.json();
    return Object.keys(g.files||{})
      .filter(f=>/^trasporti_\d{4}\.json$/.test(f))
      .map(f=>f.match(/\d{4}/)[0])
      .sort().reverse();
  }catch(e){return[];}
}

async function archiveYearToGist(year){
  if(!S.cfg||S.cfg.mode!=='gist'){alert('Funzione disponibile solo in modalità Gist.');return;}
  const archDays=Object.entries(S.data.giornaliero||{}).filter(([k])=>k.startsWith(year));
  if(!archDays.length){alert(`Nessun dato giornaliero per l'anno ${year}.`);return;}
  const archiveData={
    year,archived_at:new Date().toISOString(),
    giornaliero:Object.fromEntries(archDays),
    autisti:S.data.autisti,compagnie:S.data.compagnie,
    motrici:S.data.motrici,rimorchi:S.data.rimorchi
  };
  const fileName=`trasporti_${year}.json`;
  try{
    const r=await fetch(`https://api.github.com/gists/${S.cfg.gistId}`,{
      method:'PATCH',headers:{Authorization:`token ${S.cfg.token}`,'Content-Type':'application/json'},
      body:JSON.stringify({files:{[fileName]:{content:JSON.stringify(archiveData,null,2)}}})
    });
    if(!r.ok)throw new Error('Gist '+r.status);
    // Remove year from current data
    const data=S.data;
    data.giornaliero=Object.fromEntries(Object.entries(data.giornaliero||{}).filter(([k])=>!k.startsWith(year)));
    S.data=data;await doSave(data);
    alert(`Anno ${year} archiviato in ${fileName}.\n${archDays.length} giorni spostati dall'archivio corrente.`);
    const m=document.querySelector('.main');if(m)m.innerHTML=renderImpost();
  }catch(e){alert('Errore archivio: '+e.message);}
}

async function loadArchiveYear(year){
  if(!S.cfg||S.cfg.mode!=='gist'){alert('Funzione disponibile solo in modalità Gist.');return null;}
  const fileName=`trasporti_${year}.json`;
  try{
    const r=await fetch(`https://api.github.com/gists/${S.cfg.gistId}`,{headers:{Authorization:`token ${S.cfg.token}`}});
    if(!r.ok)throw new Error('Gist '+r.status);
    const g=await r.json();
    const f=g.files[fileName];
    if(!f){alert(`Archivio ${year} non trovato nel Gist.`);return null;}
    return JSON.parse(f.content);
  }catch(e){alert('Errore: '+e.message);return null;}
}

const CNT_MAP={'40HC':'40 HC','40HQ':'40 HC','40GP':'40 BX','40BX':'40 BX','20GP':'20 BX','20BX':'20 BX',
  '20HC':'20 HC','45HC':'45 HC','40OT':'40 OT','20OT':'20 OT','40FR':'40 FR','20FR':'20 FR',
  '40RF':'40 RF','20RF':'20 RF','40HB':'40 HC'};
const PORTO_MAP={'spezia':'SP','la spezia':'SP','livorn':'LI','genov':'GE','savona':'SV'};

function mapPorto(str){
  const s=(str||'').toLowerCase();
  for(const[k,v] of Object.entries(PORTO_MAP)){if(s.includes(k))return v;}
  return 'LI';
}
function mapCnt(str){
  const k=(str||'').replace(/\s/g,'').toUpperCase();
  return CNT_MAP[k]||str;
}
function findComp(carrier){
  const s=(carrier||'').toLowerCase().trim();if(!s)return null;
  return (S.data.compagnie||[]).find(c=>{
    const codeL=c.codice.toLowerCase();
    const words=c.nome.toLowerCase().replace(/-/g,' ').split(/\s+/);
    return s===codeL||s.includes(codeL)||codeL.includes(s)||
      words.some(w=>w.length>2&&(s===w||s.startsWith(w)||w.startsWith(s)));
  });
}
function getCompCodice(compId){return getCC(compId);}
function parseViaggio(line){
  // Remove emoji and IMPORT/EXPORT prefix
  const clean=line.replace(/^[\u{1F4E5}\u{1F4E4}📥📤]\s*(IMPORT|EXPORT)?\s*[|]?\s*/ui,'');
  const parts=clean.split('|').map(p=>p.trim());
  if(parts.length<5)return null;
  const carrier=parts[0];
  const cntRaw=parts[1];
  // parts[2] = container number (skip)
  const dest=parts[3].replace(/\s+\d{5,}$/,'').trim();
  const dtStr=parts[4];
  const portoStr=parts[5]||'';
  // Parse date: 27/05/26, 08:30 or 27/05/2026, 08:30
  const dtM=dtStr.match(/(\d{2})\/(\d{2})\/(\d{2,4})[,\s]+(\d{2}:\d{2})/);
  let date=null,ora='';
  if(dtM){
    const y=dtM[3].length===2?'20'+dtM[3]:dtM[3];
    date=y+'-'+dtM[2]+'-'+dtM[1];
    ora=dtM[4];
  }
  const comp=findComp(carrier);
  return{porto:mapPorto(portoStr),ora,ie:'',container:mapCnt(cntRaw),dest,comp:comp?comp.id:'',date};
}
function parseRiutilizziText(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const results=[];
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(l.includes('IMPORT')||(l.startsWith('📥'))||(l.startsWith('\u{1F4E5}'))){
      const importLine=l;
      let exportLine=null;
      for(let j=i+1;j<Math.min(i+4,lines.length);j++){
        if(lines[j].includes('EXPORT')||(lines[j].startsWith('📤'))||(lines[j].startsWith('\u{1F4E4}'))){
          exportLine=lines[j];i=j;break;
        }
      }
      if(importLine&&exportLine){
        const v1d=parseViaggio(importLine);
        const v2d=parseViaggio(exportLine);
        if(v1d&&v2d){
          const sameDay=(!v1d.date||!v2d.date||v1d.date===v2d.date);
          const riut=sameDay?'SD':'GD';
          const importAfternoon=!!(v1d.ora&&v1d.ora>='12:00');
          results.push({
            id:uid(),imported_at:new Date().toISOString(),
            date:v1d.date||v2d.date||td(),assigned_autista:'',
            riut,riut_dest:!sameDay?(v2d.dest||''):'',
            importAfternoon,
            v1:{porto:v1d.porto,ora:v1d.ora,ie:'I',container:v1d.container,dest:v1d.dest,comp:v1d.comp,note:''},
            v2:{porto:v2d.porto,ora:v2d.ora,ie:'E',container:v2d.container,dest:v2d.dest,comp:v2d.comp,note:''}
          });
        }
      }
    }
  }
  return results;
}

function importRiutilizzi(){
  const txt=($id('riut-paste')||{}).value||'';
  if(!txt.trim()){alert('Incolla il testo da Teams prima di importare.');return;}
  const parsed=parseRiutilizziText(txt);
  if(!parsed.length){alert('Nessun riutilizzo riconosciuto. Controlla il formato del testo.');return;}
  const data=S.data;
  if(!data.riutilizzi_pending)data.riutilizzi_pending=[];
  data.riutilizzi_pending=[...data.riutilizzi_pending,...parsed];

function abbina(rid){
  try{
    const data=S.data;
    // 1. Find riutilizzo
    const r=(data.riutilizzi_pending||[]).find(x=>x.id===rid);
    if(!r){alert('Riutilizzo non trovato.');return;}

    // 2. Get selected autista (optional)
    const aidEl=document.getElementById('aut-'+rid)||document.getElementById('giorn-aut-'+rid);
    const aid=aidEl?aidEl.value:'';
    if(!aid){
      // No autista: approve for giornaliero without assigning
      const r2=(data.riutilizzi_pending||[]).find(x=>x.id===rid);
      if(r2){r2.giornaliero_approved=true;S.data=data;scheduleSave(data);}
      S.tab='giornaliero';S.date=(r2&&r2.date)||td();render();return;
    }
    const autista=(data.autisti||[]).find(a=>a.id===aid);
    if(!autista){alert('Autista non trovato in anagrafica.');return;}

    // 3. Resolve date and type
    const date=r.date||td();
    const riutType=r.riut||'SD';
    const isAfternoon=!!(r.importAfternoon);
    const isGD=(riutType==='GD');
    const nextDate=isGD?offDate(date,1):null;

    // 4. Build empty slot object
    const emptySlot={porto:'',ora:'',ie:'',container:'',dest:'',note:'',comp:'',lv:false,ritira:''};

    // 5. Build import and export trip objects
    const importTrip={porto:r.v1.porto||autista.porto||'LI',ora:r.v1.ora||'',ie:r.v1.ie||'I',
      container:r.v1.container||'',dest:r.v1.dest||'',note:r.v1.note||'',
      comp:r.v1.comp||'',lv:false,ritira:''};
    const exportTrip={porto:r.v2.porto||'',ora:r.v2.ora||'',ie:r.v2.ie||'E',
      container:r.v2.container||'',dest:r.v2.dest||'',note:r.v2.note||'',
      comp:r.v2.comp||'',lv:false,ritira:''};

    // 6. Determine which slot import goes into
    const importSlot=isAfternoon?'v2':'v1';
    const rowRiut=isGD?'GD':(isAfternoon?'':riutType);
    const rowRiutDest=isGD?(r.riut_dest||exportTrip.dest||''):'';
    let rowV1=isAfternoon?{...emptySlot,porto:autista.porto||'LI'}:importTrip;
    let rowV2=isAfternoon?importTrip:(isGD?{...emptySlot}:exportTrip);

    // 7. Conflict checks - helper functions
    const motriceTarga=autista.last_motrice||getMTarga(autista)||'';
    const checkSlot=(d,slot)=>{
      const row=((data.giornaliero||{})[d]||{rows:{}}).rows[aid]||{};
      const v=row[slot]||{};
      // Require meaningful data: destination OR container must be set
      return !!(v.dest||v.container);
    };
    const checkAssenza=(d)=>(data.assenze||[]).some(a=>
      a.autista_id===aid&&a.data_inizio<=d&&a.data_fine>=d&&(!a.turno||a.turno==='tutto'));
    const checkRevisione=(d)=>{
      if(!motriceTarga)return false;
      const m=(data.motrici||[]).find(x=>x.targa===motriceTarga);
      const inRev=!!(m&&m.rev_prog_dal&&m.rev_prog_al&&m.rev_prog_dal<=d&&m.rev_prog_al>=d);
      const inIndisp=m&&isIndisp('motrice',m.id,d);
      return inRev||inIndisp;
    };

    const blocks=[];   // hard blocks (assenza, revisione)
    const warns=[];    // soft warnings (slot occupato, chiede conferma)
    const nome=autista.cognome+' '+autista.nome;

    // Slot conflicts → confirm (overwrite)
    if(checkSlot(date,importSlot))
      warns.push(nome+' ha gia un viaggio in '+importSlot.toUpperCase()+' il '+fd(date));
    if(isGD&&nextDate&&checkSlot(nextDate,'v1'))
      warns.push(nome+' ha gia un viaggio in V1 il '+fd(nextDate)+' (giorno del ritiro)');

    // Assenze + revisioni → hard block
    if(checkAssenza(date))
      blocks.push(nome+' e assente il '+fd(date));
    if(checkRevisione(date))
      blocks.push('Motrice '+motriceTarga+' in revisione il '+fd(date));
    if(isGD&&nextDate){
      if(checkAssenza(nextDate))
        blocks.push(nome+' e assente il '+fd(nextDate)+' (giorno del ritiro)');
      if(checkRevisione(nextDate))
        blocks.push('Motrice '+motriceTarga+' in revisione il '+fd(nextDate)+' (giorno del ritiro)');
    }

    if(blocks.length){
      alert('Abbinamento bloccato:\n- '+blocks.join('\n- ')+'\n\nIl riutilizzo rimane in sospeso.');
      return;
    }
    if(warns.length){
      if(!confirm('Attenzione:\n- '+warns.join('\n- ')+'\n\nVuoi sovrascrivere e procedere con l\'abbinamento?'))return;
    }

    // 8. Insert import row on current date
    if(!data.giornaliero)data.giornaliero={};
    if(!data.giornaliero[date])data.giornaliero[date]={rows:{},porto_overrides:{},order:[]};
    const dd=data.giornaliero[date];
    const targa=motriceTarga;
    const rimorchioTarga=autista.last_rimorchio||getRTarga(autista)||'';
    if(!dd.rows[aid]){
      dd.rows[aid]={motrice:targa,rimorchio:rimorchioTarga,riut:rowRiut,riut_dest:rowRiutDest,mattino:false,v1:rowV1,v2:rowV2};
    }else{
      const ex=dd.rows[aid];
      ex[importSlot]=isAfternoon?importTrip:(isGD?importTrip:importTrip);
      if(!isAfternoon&&!isGD)ex.v2=exportTrip;
      ex.riut=rowRiut;ex.riut_dest=rowRiutDest;
    }
    if(importTrip.porto&&importTrip.porto!==autista.porto)dd.porto_overrides[aid]=importTrip.porto;

    // 9. For GD: insert export row on next day
    if(isGD&&nextDate){
      if(!data.giornaliero[nextDate])data.giornaliero[nextDate]={rows:{},porto_overrides:{},order:[]};
      const ndd=data.giornaliero[nextDate];
      if(!ndd.rows[aid]){
        ndd.rows[aid]={motrice:targa,rimorchio:rimorchioTarga,riut:'',riut_dest:'',mattino:false,v1:exportTrip,v2:{...emptySlot}};
      }else{
        ndd.rows[aid].v1=exportTrip;
      }
      if(exportTrip.porto&&exportTrip.porto!==autista.porto)ndd.porto_overrides[aid]=exportTrip.porto;
    }

    // 10. Remove from pending and navigate
    data.riutilizzi_pending=(data.riutilizzi_pending||[]).filter(x=>x.id!==rid);
    S.data=data;
    scheduleSave(data);
    S.tab='giornaliero';S.date=date;
    render();
    setTimeout(()=>alert('Abbinato: '+nome+' — '+fd(date)+(isGD?' + '+fd(nextDate):'')),150);
  }catch(err){
    alert('Errore abbinamento: '+err.message);
    console.error('abbina error',err);
  }
}

window._storicoResults=[];

async function runStorico(){
  const qAut=(($id('st-aut')||{}).value||'').toLowerCase().trim();
  const qMot=(($id('st-mot')||{}).value||'').toUpperCase().trim();
  const qRim=(($id('st-rim')||{}).value||'').toUpperCase().trim();
  const dal=($id('st-dal')||{}).value||'';
  const al=($id('st-al')||{}).value||'';
  if(!qAut&&!qMot&&!qRim){alert('Inserisci almeno un criterio di ricerca.');return;}
  const el=$id('storico-results');
  if(el)el.innerHTML='<div style="text-align:center;color:#64748b;padding:30px">🔍 Ricerca in corso...</div>';
  const results=[];
  // Search current year
  searchInData(S.data,qAut,qMot,qRim,dal,al,results);
  // Search archived years if needed
  if(S.cfg&&S.cfg.mode==='gist'&&dal){
    const dalYear=dal.slice(0,4);
    const curYear=String(new Date().getFullYear());
    if(dalYear<curYear){
      const archived=await listGistArchives();
      for(const yr of archived){
        if(yr<dalYear)continue;
        if(yr>=curYear)continue;
        if(el)el.innerHTML='<div style="text-align:center;color:#64748b;padding:30px">🔍 Cercando archivio '+yr+'...</div>';
        const arch=await loadArchiveYear(yr);
        if(arch)searchInData(arch,qAut,qMot,qRim,dal,al,results);
      }
    }
  }
  results.sort((a,b)=>a.date.localeCompare(b.date));
  window._storicoResults=results;
  renderStoricoResults(results,el);
}

function searchInData(data,qAut,qMot,qRim,dal,al,results){
  const autisti=data.autisti||[];
  const giorn=data.giornaliero||{};
  const motrici=data.motrici||[];
  const rimorchi=data.rimorchi||[];
  const compagnie=data.compagnie||S.data.compagnie||[];
  Object.entries(giorn).forEach(([date,dd])=>{
    if(dal&&date<dal)return;
    if(al&&date>al)return;
    Object.entries(dd.rows||{}).forEach(([aid,row])=>{
      const aut=autisti.find(a=>a.id===aid);
      if(!aut)return;
      const nomeFull=(aut.cognome+' '+aut.nome).toLowerCase();
      const nomeSop=(aut.soprannome||'').toLowerCase();
      const mot=(row.motrice||'').toUpperCase();
      const rim=(row.rimorchio||'').toUpperCase();
      if(qAut&&!nomeFull.includes(qAut)&&!nomeSop.includes(qAut))return;
      if(qMot&&!mot.includes(qMot))return;
      if(qRim&&!rim.includes(qRim))return;
      const getCompName=cid=>{const c=compagnie.find(x=>x.id===cid);return c?c.codice:''};
      const v1=row.v1||{},v2=row.v2||{};
      if(v1.ie||v1.container||v1.dest||v1.ora||v1.comp){
        results.push({date,autista:aut.soprannome||aut.cognome+' '+aut.nome,
          motrice:mot,rimorchio:rim,porto:v1.porto||'',ora:v1.ora||'',
          ie:v1.ie||'',container:v1.container||'',dest:v1.dest||'',
          note:v1.note||'',carrier:getCompName(v1.comp),viaggio:'V1'});
      }
      if(v2.ie||v2.container||v2.dest||v2.ora||v2.comp){
        results.push({date,autista:aut.soprannome||aut.cognome+' '+aut.nome,
          motrice:mot,rimorchio:rim,porto:v2.porto||'',ora:v2.ora||'',
          ie:v2.ie||'',container:v2.container||'',dest:v2.dest||'',
          note:v2.note||'',carrier:getCompName(v2.comp),viaggio:'V2'});
      }
    });
  });
}

      <td style="font-size:11px;color:#64748b">${esc(r.note)}</td>
      <td style="font-weight:600">${esc(r.carrier)}</td>
      <td style="font-size:11px;color:#94a3b8">${r.viaggio}</td>
      <td>${r.riut==='SD'?'<span style="background:#fef9c3;color:#92400e;font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px">↕ SD</span>':r.riut==='GD'?'<span style="background:#fff7ed;color:#9a3412;font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px">→ GD</span>':''}</td>

  el.innerHTML=html;

function exportStoricoExcel(){
  if(!window._storicoResults||!window._storicoResults.length){alert('Esegui prima una ricerca.');return;}
  if(typeof XLSX==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>doStoricoExport();
    document.head.appendChild(s);return;
  }
  doStoricoExport();
}
function doStoricoExport(){
  const wb=XLSX.utils.book_new();
  const hdr=['Data','Giorno','Autista','Motrice','Rimorchio','Porto','Ora','I/E','Container','Destinazione','Note','Carrier','Viaggio'];
  const rows=[hdr,...window._storicoResults.map(r=>[fd(r.date),getDayName(r.date),r.autista,r.motrice,r.rimorchio,r.porto,r.ora,r.ie,r.container,r.dest,r.note,r.carrier,r.viaggio])];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:10},{wch:12},{wch:20},{wch:10},{wch:10},{wch:6},{wch:7},{wch:5},{wch:8},{wch:22},{wch:14},{wch:8},{wch:5}];
  XLSX.utils.book_append_sheet(wb,ws,'Storico');
  XLSX.writeFile(wb,'storico_'+td()+'.xlsx');
}

function saveIndisponibile(){
  const d=S.modalData||{};
  const dal=($id('fi-dal')||{}).value||'';
  const al=($id('fi-al')||{}).value||'';
  const mot=($id('fi-mot')||{}).value||INDISP_MOTIVI[0];
  const note=($id('fi-note')||{}).value||'';
  if(!dal||!al){alert('Inserisci data inizio e fine.');return;}
  if(dal>al){alert('La data fine deve essere uguale o successiva alla data inizio.');return;}
  const data=S.data;
  if(!data.indisponibili)data.indisponibili=[];
  const editId=d.editId;
  if(editId){
    const idx=data.indisponibili.findIndex(x=>x.id===editId);
    if(idx>=0)data.indisponibili[idx]={...data.indisponibili[idx],data_inizio:dal,data_fine:al,motivo:mot,note};
  }else{
    data.indisponibili.push({id:uid(),tipo:d.tipo,mezzo_id:d.mezzoId,data_inizio:dal,data_fine:al,motivo:mot,note});
  }
  S.data=data;scheduleSave(data);
  S.modalData={...d,editId:null};
  renderModal();
}

function editIndisponibile(eid){
  S.modalData={...S.modalData,editId:eid};renderModal();
}

function deleteIndisponibile(eid){
  if(!confirm('Eliminare questo periodo?'))return;
  const data=S.data;
  data.indisponibili=(data.indisponibili||[]).filter(x=>x.id!==eid);
  S.data=data;scheduleSave(data);
  S.modalData={...S.modalData,editId:null};
  renderModal();
}

function isIndisp(tipo,mezzoId,date){
  return (S.data.indisponibili||[]).some(x=>
    x.tipo===tipo&&x.mezzo_id===mezzoId&&x.data_inizio<=date&&x.data_fine>=date);
}

function getIndispMotivo(tipo,mezzoId,date){
  const x=(S.data.indisponibili||[]).find(x=>
    x.tipo===tipo&&x.mezzo_id===mezzoId&&x.data_inizio<=date&&x.data_fine>=date);
  return x?x.motivo:'';
}

// ══════════ SICUREZZA: PASSWORD HASH ══════════
function sha256(str){
  // Pure JS SHA-256 - works on file:// and HTTPS without crypto.subtle
  function rightRotate(v,a){return (v>>>a)|(v<<(32-a));}
  const m=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let h=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const bytes=[];for(let i=0;i<str.length;i++){const c2=str.charCodeAt(i);if(c2<128)bytes.push(c2);else if(c2<2048)bytes.push((c2>>6)|192,c2&63|128);else bytes.push((c2>>12)|224,((c2>>6)&63)|128,c2&63|128);}
  bytes.push(128);while((bytes.length%64)!==56)bytes.push(0);
  const blen=str.length*8;bytes.push(0,0,0,0,(blen>>>24)&255,(blen>>>16)&255,(blen>>>8)&255,blen&255);
  for(let i=0;i<bytes.length;i+=64){
    const w=[];for(let j=0;j<16;j++)w[j]=(bytes[i+j*4]<<24)|(bytes[i+j*4+1]<<16)|(bytes[i+j*4+2]<<8)|bytes[i+j*4+3];
    for(let j=16;j<64;j++){const s0=rightRotate(w[j-15],7)^rightRotate(w[j-15],18)^(w[j-15]>>>3);const s1=rightRotate(w[j-2],17)^rightRotate(w[j-2],19)^(w[j-2]>>>10);w[j]=(w[j-16]+s0+w[j-7]+s1)|0;}
    let [a,b,cc,d,e,f,g,hh]=h;
    for(let j=0;j<64;j++){const S1=rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25);const ch=(e&f)^(~e&g);const t1=(hh+S1+ch+m[j]+w[j])|0;const S0=rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22);const maj=(a&b)^(a&cc)^(b&cc);const t2=(S0+maj)|0;hh=g;g=f;f=e;e=(d+t1)|0;d=cc;cc=b;b=a;a=(t1+t2)|0;}
    h=[h[0]+a,h[1]+b,h[2]+cc,h[3]+d,h[4]+e,h[5]+f,h[6]+g,h[7]+hh].map(v=>v|0);
  }
  return h.map(v=>('00000000'+((v>>>0).toString(16))).slice(-8)).join('');
}

// Verifica password: supporta sia hash che testo in chiaro (retrocompatibile)
function checkPassword(input, stored){
  if(!stored)return false;
  if(/^[0-9a-f]{64}$/.test(stored)) return sha256(input)===stored;
  return input===stored;
}

function doExcelExport(startDate,endDate){
  const wb=XLSX.utils.book_new();
  const HDR=['#','AUTISTA','MOTRICE','RIMORCHIO','Porto','Ora','I/E','Cntr','Destinazione','Note','Carrier','LV','RIUT','Dest.domani','','Porto','Ora','I/E','Cntr','Destinazione','Note','Carrier','LV'];
  const COLS=[{wch:4},{wch:22},{wch:10},{wch:10},{wch:7},{wch:7},{wch:5},{wch:8},{wch:20},{wch:14},{wch:8},{wch:4},{wch:6},{wch:16},{wch:2},{wch:7},{wch:7},{wch:5},{wch:8},{wch:20},{wch:14},{wch:8},{wch:4}];
  const MESI=['','Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  let d=startDate;
  while(d<=endDate){
    const wsData=[];
    wsData.push(HDR);
    const dd=S.data.giornaliero[d]||{rows:{},porto_overrides:{}};
    const autisti2=(S.data.autisti||[]).filter(a=>a.attivo!==false);
    const isM=new Date(d+'T12:00:00').getDay()===1;
    const pD=offDate(d,-1);const pDD=S.data.giornaliero[pD]||{rows:{},porto_overrides:{}};
    let anyRows=false;
    PK.forEach(porto=>{
      const list=autisti2.filter(a=>{
        if(isAss(a.id,d,S.data.assenze||[]))return false;
        let p;if(dd.porto_overrides[a.id])p=dd.porto_overrides[a.id];
        else if(!isM&&pDD.porto_overrides[a.id])p=pDD.porto_overrides[a.id];
        else p=a.porto||'LI';return p===porto;
      });
      if(!list.length)return;
      wsData.push(['--- '+PORTI[porto]+' ('+porto+') ---','','','','','','','','','','','','','','','','','','','','','','']);
      list.forEach((a,i)=>{
        const sr=dd.rows[a.id]||{};
        const v1={ora:'',ie:'',container:'',dest:'',note:'',comp:'',lv:false,...(sr.v1||{})};
        const v2={porto:'',ora:'',ie:'',container:'',dest:'',note:'',comp:'',lv:false,...(sr.v2||{})};
        const mot=sr.motrice!==undefined?sr.motrice:(a.last_motrice||getMTarga(a));
        const rim=sr.rimorchio!==undefined?sr.rimorchio:(a.last_rimorchio||getRTarga(a));
        const nome=a.soprannome||a.cognome+' '+a.nome;
        wsData.push([i+1,nome,mot,rim,v1.porto,v1.ora,v1.ie,v1.container,v1.dest,v1.note,getCC(v1.comp),v1.lv?'SI':'',sr.riut||'',sr.riut_dest||'','',v2.porto,v2.ora,v2.ie,v2.container,v2.dest,v2.note,getCC(v2.comp),v2.lv?'SI':'']);
        anyRows=true;
      });
    });
    if(!anyRows)wsData.push(['— nessuna assegnazione —','','','','','','','','','','','','','','','','','','','','','','']);
    const ws=XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols']=COLS;
    const [y,m,g]=d.split('-');
    const sheetName=g+' '+MESI[parseInt(m)]+' '+y; // e.g. "01 Gen 2025"
    try{XLSX.utils.book_append_sheet(wb,ws,sheetName);}catch(e){XLSX.utils.book_append_sheet(wb,ws,d);}
    d=offDate(d,1);
  }
  if(wb.SheetNames.length===0){alert('Nessun dato nel periodo selezionato.');return;}
  XLSX.writeFile(wb,'giornaliero_'+startDate+'_'+endDate+'.xlsx');
}

document.addEventListener('click',function(e){
  const btn=e.target.closest('[data-act],[data-ev]');if(!btn)return;
  const act=btn.dataset.act;
  if(act==='tab'){S.tab=btn.dataset.tab;render();return;}
  if(act==='prevDay'){let d=offDate(S.date,-1);while(isWeekend(d))d=offDate(d,-1);S.date=d;refreshGiorn();return;}
  if(act==='nextDay'){let d=offDate(S.date,1);while(isWeekend(d))d=offDate(d,1);S.date=d;refreshGiorn();return;}
  if(act==='goToday'){S.date=td();refreshGiorn();return;}
  if(act==='up'){moveAutista(btn.dataset.dt,btn.dataset.aid,-1);return;}
  if(act==='dn'){moveAutista(btn.dataset.dt,btn.dataset.aid,1);return;}
  if(act==='mattino'){const aid2=btn.dataset.aid,dt2=btn.dataset.dt;const dd2=(S.data.giornaliero[dt2]||{rows:{}}).rows[aid2]||{};updateGiornCell(dt2,aid2,'mattino',!dd2.mattino);return;}
  if(act==='newAutista'){showModal('autista',{});return;}
  if(act==='editAutista'){const a=(S.data.autisti||[]).find(x=>x.id===btn.dataset.id);if(a)showModal('autista',{...a});return;}
  if(act==='delAutista'){confirm2('Eliminare questo autista?',()=>{S.data.autisti=(S.data.autisti||[]).filter(x=>x.id!==btn.dataset.id);scheduleSave(S.data);const m=document.querySelector('.main');if(m)m.innerHTML=renderAutisti();});return;}
  if(act==='newAssenza'){showModal('assenza',{});return;}
  if(act==='editAssenza'){const a=(S.data.assenze||[]).find(x=>x.id===btn.dataset.id);if(a)showModal('assenza',{...a});return;}
  if(act==='delAssenza'){confirm2('Eliminare questa assenza?',()=>{S.data.assenze=(S.data.assenze||[]).filter(x=>x.id!==btn.dataset.id);scheduleSave(S.data);const m=document.querySelector('.main');if(m)m.innerHTML=renderAssenze();});return;}
  if(act==='newMotrice'){showModal('motrice',{});return;}
  if(act==='editMotrice'){const a=(S.data.motrici||[]).find(x=>x.id===btn.dataset.id);if(a)showModal('motrice',{...a});return;}
  if(btn.dataset.ev==='gotoday'){S.tab='giornaliero';S.date=btn.dataset.date;render();return;}
  if(btn.dataset.ev==='delriut'){deleteRiutilizzo(btn.dataset.id);return;}
  if(act==='indispMotrice'){const a=(S.data.motrici||[]).find(x=>x.id===btn.dataset.id);if(a)showIndispModal('motrice',a.id);return;}
  if(act==='indispRimorchio'){const a=(S.data.rimorchi||[]).find(x=>x.id===btn.dataset.id);if(a)showIndispModal('rimorchio',a.id);return;}
  if(act==='delMotrice'){confirm2('Eliminare questa motrice?',()=>{S.data.motrici=(S.data.motrici||[]).filter(x=>x.id!==btn.dataset.id);scheduleSave(S.data);const m=document.querySelector('.main');if(m)m.innerHTML=renderMotrici();});return;}
  if(act==='newRimorchio'){showModal('rimorchio',{});return;}
  if(act==='editRimorchio'){const a=(S.data.rimorchi||[]).find(x=>x.id===btn.dataset.id);if(a)showModal('rimorchio',{...a});return;}
  if(act==='delRimorchio'){confirm2('Eliminare questo rimorchio?',()=>{S.data.rimorchi=(S.data.rimorchi||[]).filter(x=>x.id!==btn.dataset.id);scheduleSave(S.data);const m=document.querySelector('.main');if(m)m.innerHTML=renderRimorchi();});return;}
  if(act==='newCompagnia'){showModal('compagnia',{});return;}
  if(act==='editCompagnia'){const a=(S.data.compagnie||[]).find(x=>x.id===btn.dataset.id);if(a)showModal('compagnia',{...a});return;}
  if(act==='delCompagnia'){confirm2('Eliminare questa compagnia?',()=>{S.data.compagnie=(S.data.compagnie||[]).filter(x=>x.id!==btn.dataset.id);scheduleSave(S.data);const m=document.querySelector('.main');if(m)m.innerHTML=renderCompagnie();});return;}
  if(act==='newUser'){showModal('user',{});return;}
  if(act==='editUser'){const a=(S.data.users||[]).find(x=>x.id===btn.dataset.id);if(a)showModal('user',{...a});return;}

  if(act==='resetCfg'){if(confirm('Reimpostare la configurazione? Tutti i dati locali saranno cancellati.'))goReset();return;}

// ══════════ COLUMN RESIZE ══════════
function refreshGiorn(){
  const m=document.querySelector('.main');
  if(m){m.innerHTML=renderGiorn();setTimeout(initColResize,0);}
}

function getColWidths(){try{return JSON.parse(localStorage.getItem('tc_cw')||'{}');}catch{return{};}}
function saveColWidths(w){localStorage.setItem('tc_cw',JSON.stringify(w));}
function resetColWidths(){localStorage.removeItem('tc_cw');refreshGiorn();}
function initColResize(){
  const tbl=document.querySelector('.giorn-table');if(!tbl)return;
  const ths=tbl.querySelectorAll('thead th');
  const saved=getColWidths();
  ths.forEach((th,i)=>{
    if(saved[i])th.style.width=saved[i]+'px';
    if(!th.querySelector('.rh')){const rh=document.createElement('div');rh.className='rh';th.appendChild(rh);}
  });
}
let _rcol=null;
document.addEventListener('mousedown',function(e){
  if(!e.target.classList.contains('rh'))return;
  const th=e.target.closest('th');
  const ths=[...th.closest('tr').querySelectorAll('th')];
  _rcol={th,ci:ths.indexOf(th),x0:e.clientX,w0:th.offsetWidth};
  e.preventDefault();
});
document.addEventListener('mousemove',function(e){
  if(!_rcol)return;
  _rcol.th.style.width=Math.max(24,_rcol.w0+e.clientX-_rcol.x0)+'px';
  e.preventDefault();
});
document.addEventListener('mouseup',function(){
  if(!_rcol)return;
  const w=getColWidths();w[_rcol.ci]=Math.round(_rcol.th.offsetWidth);saveColWidths(w);_rcol=null;
});
// ══════════ AUTO-SYNC ══════════
let syncTimer=null;
let lastGistUpdated=null;

async function checkSync(){
  if(!S.cfg||S.cfg.mode!=='gist'||S.phase!=='app')return;
  if(saveTimer)return; // ho modifiche locali in attesa, non sovrascrivere
  try{
    const r=await fetch(`https://api.github.com/gists/${S.cfg.gistId}`,{headers:{Authorization:`token ${S.cfg.token}`}});
    if(!r.ok)return;
    const g=await r.json();
    const upd=g.updated_at;
    if(lastGistUpdated&&upd!==lastGistUpdated){
      // Dati cambiati: ricarica
      const f=g.files[GIST_FILE];
      if(f){
        const newData=JSON.parse(f.content);
        S.data=newData;
        lastGistUpdated=upd;
        // Aggiorna UI senza perdere posizione
        const m=document.querySelector('.main');
        if(m){
          if(S.tab==='giornaliero'){m.innerHTML=renderGiorn();setTimeout(initColResize,0);}
          else if(S.tab==='autisti')m.innerHTML=renderAutisti();
          else if(S.tab==='assenze')m.innerHTML=renderAssenze();
          else if(S.tab==='motrici')m.innerHTML=renderMotrici();
          else if(S.tab==='rimorchi')m.innerHTML=renderRimorchi();
          else if(S.tab==='compagnie')m.innerHTML=renderCompagnie();
          else if(S.tab==='scadenze')m.innerHTML=renderScadenze();
          else if(S.tab==='impostazioni')m.innerHTML=renderImpost();
        }
        // Mostra notifica discreta
        showSyncNotice();
      }
    }else if(!lastGistUpdated){
      lastGistUpdated=upd;
    }
  }catch{}
}

function showSyncNotice(){
  let el=$id('sync-notice');
  if(!el){
    el=document.createElement('div');
    el.id='sync-notice';
    el.style.cssText='position:fixed;bottom:16px;right:16px;background:#0c1c2e;color:#fff;font-size:12px;padding:7px 13px;border-radius:6px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none';
    document.body.appendChild(el);
  }
  el.textContent='🔄 Aggiornato';
  el.style.opacity='1';
  setTimeout(()=>{el.style.opacity='0';},2000);
}

function startSync(){
  if(syncTimer)clearInterval(syncTimer);
  syncTimer=setInterval(checkSync,20000); // ogni 20 secondi
}

// ══════════ INIT ══════════
(async function init(){
  S.phase='init';render();
  let cfg=null,sess=null;
  try{cfg=JSON.parse(localStorage.getItem(LS_CFG));}catch{}
  try{sess=JSON.parse(localStorage.getItem(LS_SESS));}catch{}
  if(!cfg){S._setupMode='gist';S.phase='setup';render();return;}
  S.cfg=cfg;
  if(cfg.mode==='local'){
    let data=defData();
    try{const saved=localStorage.getItem(LS_DATA);if(saved)data=JSON.parse(saved);}catch{}
    S.data=data;
    if(sess){S.user=sess;S.phase='app';}else S.phase='login';
    render();return;
  }
  // Gist mode
  if(sess){
    S.user=sess;
    try{
      const r=await fetch(`https://api.github.com/gists/${cfg.gistId}`,{headers:{Authorization:`token ${cfg.token}`}});
      if(r.ok){const g=await r.json();lastGistUpdated=g.updated_at;const f=g.files[GIST_FILE];S.data=f?JSON.parse(f.content):defData();}
      else S.data=defData();
    }catch{S.data=defData();}
    S.phase='app';startSync();
  }else{
    try{
      const r=await fetch(`https://api.github.com/gists/${cfg.gistId}`,{headers:{Authorization:`token ${cfg.token}`}});
      if(r.ok){const g=await r.json();lastGistUpdated=g.updated_at;const f=g.files[GIST_FILE];S.data=f?JSON.parse(f.content):defData();}
      else S.data=defData();
    }catch{S.data=defData();}
    S.phase='login';
  }
  render();
})();
</script>
